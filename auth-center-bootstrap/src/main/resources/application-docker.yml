server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: auth-center-docker
  config:
    import: ""
  cloud:
    consul:
      enabled: false
      config:
        enabled: false
      discovery:
        enabled: false
        register: false
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:auth}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000

grpc:
  server:
    enabled: true
    port: ${GRPC_SERVER_PORT:9090}

mybatis:
  type-aliases-package: com.example.authcenter.infra.identity.po
  mapper-locations: classpath*:mapper/*.xml

jwt:
  secret: ${JWT_SECRET:your-256-bit-secret-your-256-bit-secret}
  expire: ${JWT_EXPIRE:3600000}

logging:
  level:
    com.example.authcenter: info
    org.mybatis: info
    org.apache.ibatis: info
