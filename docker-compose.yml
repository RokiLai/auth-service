services:
  mysql:
    image: mysql:8.2
    container_name: mysql-container
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_service
      MYSQL_USER: roki
      MYSQL_PASSWORD: 123456
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - auth-net

  redis:
    image: redis:7.2
    container_name: redis-container
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - auth-net

  auth-bootstrap:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: auth-bootstrap-container
    depends_on:
      - mysql
      - redis
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: test
    networks:
      - auth-net

  auth-web:
    build:
      context: ../../vue-auth-service
      dockerfile: Dockerfile
    container_name: auth-web-container
    ports:
      - "80:80"
    depends_on:
      - auth-bootstrap
    networks:
      - auth-net

volumes:
  mysql-data:
  redis-data:

networks:
  auth-net:

