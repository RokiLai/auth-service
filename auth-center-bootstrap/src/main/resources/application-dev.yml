#debug: true

server:
  port: 8081

spring:
  config:
    import: "optional:consul:"
  application:
    name: auth-center
  cloud:
    consul:
      host: ${CONSUL_HOST:192.168.31.169}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        format: YAML
        prefixes: config
        default-context: application
        profile-separator: "-"
        data-key: data
        watch:
          enabled: true
      discovery:
        enabled: true
        register: true
        prefer-ip-address: true
        ip-address: ${HOST_IP:192.168.31.50}
        service-name: ${spring.application.name}
        health-check-path: /actuator/health
        health-check-url: http://${spring.cloud.consul.discovery.ip-address}:${server.port}${spring.cloud.consul.discovery.health-check-path}
        metadata:
          grpc-port: ${grpc.server.port}

grpc:
  server:
    enabled: true
    port: ${GRPC_SERVER_PORT:9090}

mybatis:
  type-aliases-package: com.example.authcenter.infra.po
  mapper-locations: classpath*:mapper/*.xml


logging:
  level:
    com.example.authcenter: info  # 你的业务包
    org.mybatis: debug          # MyBatis 本身
    org.mybatis.spring.SqlSessionFactoryBean: debug
    org.apache.ibatis: debug    # ⬅️ 打印 SQL 和参数
    org.springframework.cloud.consul: info
