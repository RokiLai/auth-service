spring:
  application:
    name: auth-center
  profiles:
    default: dev
  config:
    import: "optional:consul:${CONSUL_HOST:192.168.31.169}:${CONSUL_PORT:8500}/config"
  cloud:
    consul:
      host: ${CONSUL_HOST:192.168.31.169}
      port: ${CONSUL_PORT:8500}
      config:
        enabled: true
        format: YAML
        data-key: data
        watch:
          enabled: true
      discovery:
        enabled: true
        prefer-ip-address: true
        service-name: ${APP_HTTP_SERVICE_NAME:${spring.application.name}-http}
        health-check-path: /actuator/health
        metadata:
          application-name: ${spring.application.name}
          protocol: http
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${MYSQL_USERNAME}
    password: ${MYSQL_PASSWORD}
  data:
    redis:
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:5000}

app:
  consul:
    rpc-registration:
      enabled: true
      service-name: ${APP_RPC_SERVICE_NAME:${spring.application.name}-rpc}
  backend-discovery:
    enabled: true
    mysql:
      service-name: ${MYSQL_SERVICE_NAME:mysql-proxy-service}
      database: ${MYSQL_DATABASE:auth}
      jdbc-params: ${MYSQL_JDBC_PARAMS:useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false}
    redis:
      service-name: ${REDIS_SERVICE_NAME:redis-proxy-service}

mybatis:
  type-aliases-package: com.example.authcenter.infra.identity.po
  mapper-locations: classpath*:mapper/*.xml

logging:
  level:
    com.example.authcenter: info
    org.mybatis: info
    org.apache.ibatis: info
    org.springframework.cloud.consul: info

roki:
  exception:
    error-code:
      project-code: "10"
      default-biz-code: "01"
      biz-codes:
        auth: "01"
