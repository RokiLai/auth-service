syntax = "proto3";

package authcenter.v1;

option java_multiple_files = true;
option java_package = "com.example.authcenter.grpc";
option java_outer_classname = "AuthCenterProto";

service IdentityService {
  rpc ValidateToken (TokenRequest) returns (UserInfoReply);
}

service ConfigDebugService {
  rpc GetConsulConfig (ConsulConfigRequest) returns (ConsulConfigReply);
}

message UserInfoReply {
  int64 id = 1;
  string username = 2;
  string email = 3;
}

message TokenRequest {
  string token = 1;
}

message ConsulConfigRequest {
}

message ConsulConfigReply {
  string application_name = 1;
  string active_profile = 2;
  string demo_message = 3;
  string sample_flag = 4;
}
